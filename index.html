<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            <header class="todo-header">
                <h2 data-testid="test-todo-title">Complete Frontend Task</h2>
                <span class="badge priority-high" data-testid="test-todo-priority" aria-label="High Priority">
                    🔥 High
                </span>
            </header>

            <p class="todo-description" data-testid="test-todo-description">
                Build a testable Todo card using vanilla HTML, CSS, and JS. 
                Ensure all data-testids match the requirements.
            </p>

            <div class="todo-meta">
                <div class="date-group">
                    <time class="due-date" data-testid="test-todo-due-date" datetime="2026-04-16T18:00">
                        Due Apr 16, 2026
                    </time>
                    <time class="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite">
                        Calculating...
                    </time>
                </div>

                <div class="status-group">
                    Status: <span data-testid="test-todo-status">Pending</span>
                </div>
            </div>

            <ul class="tag-list" data-testid="test-todo-tags" role="list">
                <li data-testid="test-todo-tag-work">Work</li>
                <li data-testid="test-todo-tag-urgent">Urgent</li>
            </ul>

            <div class="todo-controls">
                <label class="checkbox-container">
                    <input type="checkbox" data-testid="test-todo-complete-toggle" id="todo-toggle">
                    <span class="label-text">Mark as Done</span>
                </label>

                <div class="action-buttons">
                    <button data-testid="test-todo-edit-button" aria-label="Edit Task">Edit</button>
                    <button data-testid="test-todo-delete-button" aria-label="Delete Task">Delete</button>
                </div>
            </div>

        </article>
    </main>

    <script src="script.js"></script>
</body>
</html>
