<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="container">
      <section class="input-section">
        <h1>Todo List</h1>
        <form id="todo-form">
          <div class="form-group">
            <label for="task-title">Task Title</label>
            <input
              type="text"
              id="task-title"
              placeholder="What needs to be done?"
              required
            />
          </div>

          <div class="form-group">
            <label for="task-desc">Description</label>
            <textarea
              id="task-desc"
              placeholder="Add some details..."
            ></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="task-priority">Priority</label>
              <select id="task-priority">
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </div>

            <div class="form-group">
              <label for="task-deadline">Deadline</label>
              <input type="datetime-local" id="task-deadline" required />
            </div>
          </div>

          <button type="submit" id="add-task-btn">Add Task</button>
        </form>
      </section>

      <hr />

      <div id="todo-list" class="todo-list-grid">
        <article class="todo-card" data-testid="test-todo-card">
          <header>
            <h2 data-testid="test-todo-title">Todo Item</h2>
            <span
              class="priority-badge"
              data-testid="test-todo-priority"
              aria-label="High Priority"
            >
              High
            </span>
          </header>

          <p data-testid="test-todo-description">
            This is an example task to ensure all test IDs are present on page
            load.
          </p>

          <div class="todo-details">
            <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00">
              Due Apr 16, 2026
            </time>
            <span data-testid="test-todo-time-remaining" class="timer">
              Due in 6 days
            </span>
          </div>

          <div class="todo-status">
            Status: <strong data-testid="test-todo-status">Pending</strong>
          </div>

          <ul class="tag-list" data-testid="test-todo-tags" role="list">
            <li data-testid="test-todo-tag-work">work</li>
            <li data-testid="test-todo-tag-urgent">urgent</li>
          </ul>

          <div class="todo-actions">
            <label class="toggle-container">
              <input type="checkbox" data-testid="test-todo-complete-toggle" />
              <span>Done</span>
            </label>
            <div class="btn-group">
              <button data-testid="test-todo-edit-button" aria-label="Edit">
                Edit
              </button>
              <button data-testid="test-todo-delete-button" aria-label="Delete">
                Delete
              </button>
            </div>
          </div>
        </article>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
